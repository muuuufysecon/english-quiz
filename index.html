// 5. スピーキングテスト (音声認識 + iPhoneフォールバック)
const SpeakingTest = ({ questions, currentIndex, setCurrentIndex, score, setScore, onFinish, onAnswer }) => {
  const [recognizedText, setRecognizedText] = useState('');
  const [showResult, setShowResult] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  const [isListening, setIsListening] = useState(false);
  const [isFallback, setIsFallback] = useState(false); 
  const [inputText, setInputText] = useState('');
  const [errorMessage, setErrorMessage] = useState('');
  const currentQ = questions[currentIndex];

  useEffect(() => {
    setRecognizedText('');
    setShowResult(false);
    setIsCorrect(false);
    setIsFallback(false);
    setInputText('');
    setErrorMessage('');
  }, [currentIndex]);

  const startListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setErrorMessage("ブラウザが音声認識に未対応のため、入力モードに切り替えました。");
      setIsFallback(true);
      return;
    }

    try {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      const timeoutId = setTimeout(() => {
        if (!isListening) {
           recognition.stop();
           setErrorMessage("マイクの起動に失敗しました。");
           setIsFallback(true);
        }
      }, 3000);

      recognition.onstart = () => {
        clearTimeout(timeoutId);
        setIsListening(true);
        setRecognizedText('聞き取っています...');
        setErrorMessage('');
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        setRecognizedText(transcript);
        setIsListening(false);
        checkAnswer(transcript); 
      };

      recognition.onerror = (event) => {
        clearTimeout(timeoutId);
        console.error("Speech recognition error", event.error);
        setIsListening(false);
        setRecognizedText('');
        setErrorMessage("マイクへのアクセスが拒否されたか、エラーが発生しました。");
        setIsFallback(true);
      };

      recognition.onend = () => {
        clearTimeout(timeoutId);
        setIsListening(false);
      };

      recognition.start();
    } catch (e) {
      console.error(e);
      setIsListening(false);
      setErrorMessage("マイクの起動エラーが発生しました。");
      setIsFallback(true);
    }
  };

  const checkAnswer = (transcript) => {
    const normalize = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');
    const match = normalize(transcript) === normalize(currentQ.en);
    setIsCorrect(match);
    setShowResult(true);
  };

  const handleNext = () => {
    if (isCorrect) setScore(s => s + 1);
    onAnswer(isCorrect);
    
    if (currentIndex < questions.length - 1) {
      setCurrentIndex(i => i + 1);
    } else {
      onFinish();
    }
  };

  const handleFallbackCheck = () => {
    if (!inputText.trim()) return;
    checkAnswer(inputText);
  };

  return (
    <div className="flex flex-col h-full bg-white relative">
      <ProgressBar current={currentIndex} total={questions.length} />
      <div className="p-6 flex-1 flex flex-col items-center overflow-y-auto">
        <div className="text-center mb-6 text-sm text-slate-500 font-medium tracking-wider w-full">
          問題 {currentIndex + 1} / {questions.length}
        </div>
        
        <div className="flex-1 flex flex-col justify-center items-center w-full max-w-md md:max-w-2xl mx-auto">
          
          <div className="w-full bg-slate-50 p-6 rounded-2xl mb-8 shadow-sm border border-slate-200 relative group">
            <h2 className="text-2xl font-bold text-slate-800 text-center leading-relaxed">
              {currentQ?.en}
            </h2>
            <p className="text-center text-slate-500 mt-2 text-sm">{currentQ?.ja}</p>
            <button onClick={() => speakText(currentQ?.en)} className="absolute top-2 right-2 text-blue-400 p-2 hover:bg-blue-100 hover:text-blue-600 rounded-full transition-colors" title="お手本を聞く"><Volume2 size={20}/></button>
          </div>

          {!showResult ? (
            <div className="flex flex-col items-center w-full">
              {!isFallback ? (
                 <>
                   <p className="text-slate-500 text-sm mb-4">マイクボタンを押して、英文を読んでください</p>
                   <button 
                    onClick={startListening}
                    disabled={isListening}
                    className={`w-24 h-24 rounded-full flex items-center justify-center transition-all shadow-md ${isListening ? 'bg-rose-500 text-white animate-pulse' : 'bg-blue-600 text-white hover:bg-blue-700 active:scale-95'}`}
                  >
                    <Mic size={40} />
                  </button>
                  {recognizedText && <p className="mt-6 text-slate-600 font-mono text-center bg-slate-100 p-3 rounded-lg w-full">{recognizedText}</p>}
                  <button onClick={() => setIsFallback(true)} className="mt-8 text-xs text-slate-400 underline hover:text-slate-600 p-2">
                    マイクが上手く機能しない場合はこちら
                  </button>
                 </>
              ) : (
                <div className="w-full animate-in fade-in duration-300">
                  {errorMessage && <p className="text-xs text-rose-500 font-bold mb-3 bg-rose-50 p-3 rounded-xl border border-rose-100">{errorMessage}</p>}
                  <p className="text-slate-500 text-sm mb-2">英文をタイピングしてください<br/><span className="text-xs text-blue-500 font-bold">※キーボードのマイクボタンで音声入力が可能です</span></p>
                  <input
                    type="text"
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleFallbackCheck()}
                    placeholder="Type the English sentence..."
                    className="w-full text-center text-lg p-4 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50 mb-4 font-mono"
                    autoComplete="off" spellCheck="false"
                  />
                  <button onClick={handleFallbackCheck} disabled={!inputText.trim()} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 disabled:opacity-50">
                    答え合わせ
                  </button>
                  <button onClick={() => setIsFallback(false)} className="mt-4 w-full text-xs text-slate-400 underline hover:text-slate-600 p-2">
                    アプリのマイクに戻る
                  </button>
                </div>
              )}
            </div>
          ) : (
            <div className="w-full flex flex-col items-center animate-in fade-in slide-in-from-bottom-4 duration-300">
               <div className="mb-4 w-full">
                  <p className="text-xs text-slate-500 mb-1">認識・入力されたテキスト:</p>
                  <div className="p-4 bg-slate-100 rounded-xl border border-slate-200 font-mono text-slate-700 text-lg text-center break-words">
                    {isFallback ? inputText : (recognizedText || "(音声なし)")}
                  </div>
               </div>

              <div className={`w-full p-4 rounded-xl mb-6 text-center font-bold text-lg flex items-center justify-center gap-2 ${isCorrect ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-rose-100 text-rose-700 border border-rose-200'}`}>
                {isCorrect ? <><CheckCircle2 /> {isFallback ? '正解！' : '発音バッチリ！'}</> : <><XCircle /> もう少し！</>}
              </div>
              
              {!isCorrect && (
                <button 
                  onClick={() => { setShowResult(false); setRecognizedText(''); setInputText(''); }}
                  className="w-full py-3 mb-4 border-2 border-blue-400 text-blue-600 bg-blue-50 rounded-xl font-bold hover:bg-blue-100 transition-colors"
                >
                  もう一度{isFallback ? '入力' : '発音'}してみる
                </button>
              )}

              <button 
                onClick={handleNext}
                className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold text-lg shadow-md hover:bg-slate-700 active:scale-[0.98] transition-all flex justify-center items-center gap-2"
              >
                次へ <ArrowRight size={20} />
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};


// ホーム画面 (モード選択 & 履歴・復習)
const HomeView = ({ onStart, statsData, historyData, onReview, onExportText, onImportText, dailyChecks, setTodayModal }) => {
  const [tab, setTab] = useState('learn');
  const [currentDate, setCurrentDate] = useState(new Date());
  const [selectedDate, setSelectedDate] = useState(new Date());
  const [showHistoryModal, setShowHistoryModal] = useState(false);
  const fileInputRef = useRef(null);

  // --- デイリーチェックの集計 ---
  const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
  const todaysRecords = historyData.filter(r => {
    const d = new Date(r.date);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}` === todayStr;
  });

  const getDailyProgress = (mode) => {
    const records = todaysRecords.filter(r => r.mode === mode).sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());
    let first = false;
    let second = false;
    if (records.length > 0) {
      first = true;
      if (records[0].accuracy >= 80) {
        second = true; 
      } else if (records.length > 1) {
        second = true;
      }
    }
    return { first, second };
  };

  const DailyChecks = ({ mode }) => {
    const { first, second } = getDailyProgress(mode);
    return (
      <div className="flex gap-1 items-center">
        <div className={`w-3.5 h-3.5 rounded-sm flex items-center justify-center border ${first ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-slate-100 border-slate-200'}`} title="1回目完了">
          {first && <CheckCircle2 size={10} className="stroke-[3]" />}
        </div>
        <div className={`w-3.5 h-3.5 rounded-sm flex items-center justify-center border ${second ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-slate-100 border-slate-200'}`} title="2回目完了 (8割以上でスキップ)">
          {second && <CheckCircle2 size={10} className="stroke-[3]" />}
        </div>
      </div>
    );
  };

  // --- 今日の学習チェック集計（80%ルール適用） ---
  const computeAcc = (r) => {
    if (!r) return null;
    if (typeof r.accuracy === 'number') return r.accuracy;
    if (Array.isArray(r.results) && r.results.length > 0) {
      return (r.results.filter(x => x && (x.isCorrect || x.correct)).length / r.results.length) * 100;
    }
    if (typeof r.correctCount === 'number' && typeof r.total === 'number' && r.total > 0) {
      return (r.correctCount / r.total) * 100;
    }
    if (typeof r.score === 'number' && typeof r.total === 'number' && r.total > 0) {
      return (r.score / r.total) * 100;
    }
    return null;
  };
  const todayWordRecords = todaysRecords.filter(r => r && typeof r.mode === 'string' && r.mode.startsWith('word_'));
  const todaySentenceRecords = todaysRecords.filter(r => r && typeof r.mode === 'string' && r.mode.startsWith('sentence_'));
  const todayOutputRecords = todaysRecords.filter(r => r && typeof r.mode === 'string' && (r.mode === 'listening' || ((r.mode.startsWith('writing') || r.mode.startsWith('speaking')) && r.mode !== 'review_writing')));
  const dcVocab = (dailyChecks && typeof dailyChecks.vocab === 'number') ? dailyChecks.vocab : 0;
  const dcSentence = (dailyChecks && typeof dailyChecks.sentence === 'number') ? dailyChecks.sentence : 0;
  const dcOutputs = (dailyChecks && Array.isArray(dailyChecks.outputs)) ? dailyChecks.outputs : [];
  const hasWord80 = todayWordRecords.some(r => { const a = computeAcc(r); return a !== null && a >= 80; });
  const hasSentence80 = todaySentenceRecords.some(r => { const a = computeAcc(r); return a !== null && a >= 80; });
  const todayVocabChecks = hasWord80 ? 2 : Math.max(dcVocab, Math.min(todayWordRecords.length, 2));
  const todaySentenceChecks = hasSentence80 ? 2 : Math.max(dcSentence, Math.min(todaySentenceRecords.length, 2));
  const todayOutputChecks = (() => {
    // 復習を全部終えたら、アウトプット特訓のチェックを自動的に満点にする
    const _reviewWordCount = todaysRecords.filter(r => r.mode === 'review_word').length;
    const _reviewSentenceCount = todaysRecords.filter(r => r.mode === 'review_sentence' || r.mode === 'review_writing').length;
    const _wordsNeedReview = statsData.filter(d => d.needsReview && d.type === 'word').length;
    const _sentencesNeedReview = statsData.filter(d => d.needsReview && d.type === 'sentence').length;
    const _reviewAllDone =
      (_reviewWordCount >= 1 || _wordsNeedReview === 0) &&
      (_reviewSentenceCount >= 1 || _sentencesNeedReview === 0) &&
      (todayWordRecords.length > 0 || todaySentenceRecords.length > 0);
    if (_reviewAllDone) return 3;
    const passed = new Set();
    let anyAcc = false;
    todayOutputRecords.forEach(r => {
      const a = computeAcc(r);
      if (a !== null) {
        anyAcc = true;
        let key = null;
        if (r.mode === 'listening') key = 'listening';
        else if (typeof r.mode === 'string' && r.mode.startsWith('writing') && r.mode !== 'review_writing') key = 'writing';
        else if (typeof r.mode === 'string' && r.mode.startsWith('speaking')) key = 'speaking';
        if (!key) return;
        if (a >= 80) {
          passed.add(key);
        } else {
          // 80点未満でも、間違えた問題が履歴復習で全て解決済みならチェックを付ける
          const wrongItems = Array.isArray(r.results) ? r.results.filter(x => x && !x.isCorrect) : [];
          if (wrongItems.length === 0) {
            passed.add(key);
          } else {
            const allReviewed = wrongItems.every(wi => {
              const stat = statsData.find(d => d && d.en === wi.en);
              if (!stat) return false;
              if (key === 'writing') return stat.needsWritingReview === false;
              return stat.needsReview === false;
            });
            if (allReviewed) passed.add(key);
          }
        }
      }
    });
    return anyAcc ? passed.size : dcOutputs.length;
  })();

  const getGroupDailyProgress = (modes) => {
    let groupFirst = false;
    let groupSecond = false;
    modes.forEach(mode => {
      const { first, second } = getDailyProgress(mode);
      if (first) groupFirst = true;
      if (second) groupSecond = true;
    });
    return { first: groupFirst, second: groupSecond };
  };

  const DailyChecksGroup = ({ modes }) => {
    const { first, second } = getGroupDailyProgress(modes);
    return (
      <div className="flex gap-1 items-center">
        <div className={`w-4 h-4 rounded-sm flex items-center justify-center border ${first ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-slate-100 border-slate-200'}`} title="1回目完了 (どれか1つクリアでOK)">
          {first && <CheckCircle2 size={12} className="stroke-[3]" />}
        </div>
        <div className={`w-4 h-4 rounded-sm flex items-center justify-center border ${second ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-slate-100 border-slate-200'}`} title="2回目完了 (どれか1つで8割以上)">
          {second && <CheckCircle2 size={12} className="stroke-[3]" />}
        </div>
      </div>
    );
  };

  // 進捗率取得用
  const getCorrectCount = (dataset) => {
    return dataset.filter(w => statsData.some(s => s.en === w.en && s.correctCount > 0)).length;
  };

  // --- 復習対象の抽出 ---
  const needsReviewWords = statsData.filter(d => d.needsReview && d.type === 'word');
  const needsReviewSentences = statsData.filter(d => d.needsReview && d.type === 'sentence');
  const needsReviewWritings = statsData.filter(d => d.needsWritingReview && d.type === 'sentence');
  const allWrongWords = statsData.filter(d => d.wrongCount > 0 && d.type === 'word');
  const allWrongSentences = statsData.filter(d => d.wrongCount > 0 && d.type === 'sentence');

  const reviewWordCountToday = todaysRecords.filter(r => r.mode === 'review_word').length;
  const reviewSentenceCountToday = todaysRecords.filter(r => r.mode === 'review_sentence').length;
  const reviewWritingCountToday = todaysRecords.filter(r => r.mode === 'review_writing').length;
  const canReviewWord = needsReviewWords.length > 0;
  const canReviewSentence = needsReviewSentences.length > 0;
  const canReviewWriting = needsReviewWritings.length > 0;

  // --- カレンダー処理 ---
  const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
  const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const daysInMonth = getDaysInMonth(year, month);
  const firstDay = getFirstDayOfMonth(year, month);

  const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
  const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

  const calendarDays = [];
  for (let i = 0; i < firstDay; i++) {
    calendarDays.push({ number: '', isCurrentMonth: false });
  }
  for (let i = 1; i <= daysInMonth; i++) {
    calendarDays.push({ 
      number: i, 
      isCurrentMonth: true,
      dateStr: `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`
    });
  }

  const getRecordsForDate = (dateStr) => {
    return historyData.filter(record => {
      const recordDate = new Date(record.date);
      const rDateStr = `${recordDate.getFullYear()}-${String(recordDate.getMonth() + 1).padStart(2, '0')}-${String(recordDate.getDate()).padStart(2, '0')}`;
      return rDateStr === dateStr;
    });
  };

  const selectedDateStr = `${selectedDate.getFullYear()}-${String(selectedDate.getMonth() + 1).padStart(2, '0')}-${String(selectedDate.getDate()).padStart(2, '0')}`;
  const selectedDateRecords = getRecordsForDate(selectedDateStr);

  const formatModeName = (mode) => {
    const names = {
      'word_basic': '単語 基本', 'word_lvl1': '単語 Lv.1', 'word_lvl2': '単語 Lv.2', 'word_lvl3': '単語 Lv.3',
      'sentence_lvl1': '短文 Lv.1', 'sentence_lvl2': '短文 Lv.2', 'sentence_lvl3': '短文 Lv.3', 'sentence_lvl4': '短文 Lv.4', 'sentence_lvl5': '短文 Lv.5',
      'word': '単語 旧基本', 'sentence': '短文 旧基本',
      'listening': 'リスニング', 'writing': 'ライティング', 'speaking': 'スピーキング',
      'writing_basic': 'ライティング 基本', 'writing_lvl1': 'ライティング Lv.1', 'writing_lvl2': 'ライティング Lv.2', 'writing_lvl3': 'ライティング Lv.3',
      'speaking_basic': 'スピーキング 基本', 'speaking_lvl1': 'スピーキング Lv.1', 'speaking_lvl2': 'スピーキング Lv.2', 'speaking_lvl3': 'スピーキング Lv.3',
      'review_word': '単語 復習', 'review_sentence': '短文 復習', 'review_writing': 'ライティング 復習'
    };
    return names[mode] || mode;
  };

  const doExportFile = () => {
    const text = onExportText();
    const blob = new Blob([text], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'english_words.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const triggerFileInput = () => {
    if (fileInputRef.current) {
      fileInputRef.current.click();
    }
  };

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const jsonString = event.target.result;
      onImportText(jsonString);
    };
    reader.onerror = () => {
      alert("ファイルの読み込みに失敗しました。");
    };
    reader.readAsText(file);
    e.target.value = null; // リセット
  };

  return (
    <div className="h-full flex flex-col bg-slate-50">
      {/* タブ切り替え */}
      <div className="flex bg-white border-b border-slate-200 shadow-sm z-10 sticky top-0 overflow-x-auto no-scrollbar shrink-0 justify-center">
        <button 
          onClick={() => setTab('learn')} 
          className={`px-3 sm:px-4 py-4 min-w-[80px] sm:w-32 text-xs font-bold transition-colors border-b-2 flex flex-col items-center gap-1 relative ${tab === 'learn' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
        >
          <BookOpen size={18} /> 学習
        </button>
        <button 
          onClick={() => setTab('today')} 
          className={`px-3 sm:px-4 py-4 min-w-[80px] sm:w-32 text-xs font-bold transition-colors border-b-2 flex flex-col items-center gap-1 ${tab === 'today' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
        >
          <ListChecks size={18} /> 今日の問題
        </button>
        <button 
          onClick={() => setTab('review')} 
          className={`px-3 sm:px-4 py-4 min-w-[80px] sm:w-32 text-xs font-bold transition-colors border-b-2 flex flex-col items-center gap-1 relative ${tab === 'review' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
        >
          <History size={18} /> 履歴
          {(needsReviewWords.length > 0 || needsReviewSentences.length > 0) && (
            <span className="absolute top-3 right-3 w-2 h-2 rounded-full bg-rose-500"></span>
          )}
        </button>
        <RankTabButton />
        <BadgeTabButton />
        <button 
          onClick={() => setTab('settings')} 
          className={`px-3 sm:px-4 py-4 min-w-[80px] sm:w-32 text-xs font-bold transition-colors border-b-2 flex flex-col items-center gap-1 ${tab === 'settings' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
        >
          <Settings size={18} /> データ
        </button>
      </div>

      <div className="flex-1 overflow-y-auto p-4 sm:p-6 relative">
        {tab === 'learn' && (
          <div className="space-y-6 animate-in fade-in duration-300 max-w-5xl mx-auto w-full pb-8">
            <div className="text-center mb-2 mt-4">
              <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mb-4 shadow-inner">
                <BookOpen size={32} />
              </div>
              <h1 className="text-2xl sm:text-3xl font-extrabold text-slate-800 mb-2">EnglishMaster</h1>
              <p className="text-slate-500 text-xs sm:text-sm">毎日の積み重ねで英語力をアップしよう</p><button type="button" onClick={() => window.location.reload()} className="mt-3 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 text-xs font-bold shadow-sm transition" title="画面を再読み込み"><RefreshCw size={14} />画面を更新</button>
            </div>

            {/* 今日の学習 セクション */}
            <div>
              <h2 className="text-base font-bold text-slate-800 flex items-center gap-2 mb-3">
                <CalendarDays size={18} className="text-blue-600" />
                今日の学習
              </h2>
              <div className="space-y-2.5">
                <button
                  onClick={() => setTodayModal && setTodayModal('word')}
                  className="w-full flex items-center justify-between p-4 rounded-xl bg-white border border-slate-200 hover:border-blue-400 hover:bg-blue-50 shadow-sm transition text-left"
                >
                  <span className="flex items-center gap-3">
                    <span className="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center">
                      <BookOpen size={20} />
                    </span>
                    <span>
                      <span className="block font-bold text-slate-800">一問一答</span>
                      <span className="block text-xs text-slate-500">全約1,700問</span>
                    </span>
                  </span>
                  <div className="flex gap-1.5">
                    <span className={'inline-flex items-center justify-center w-7 h-7 rounded-md border-2 text-base font-bold shadow-sm transition ' + ((todayVocabChecks >= 1) ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-slate-300 text-slate-300')}>✓</span>
                    <span className={'inline-flex items-center justify-center w-7 h-7 rounded-md border-2 text-base font-bold shadow-sm transition ' + ((todayVocabChecks >= 2) ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-slate-300 text-slate-300')}>✓</span>{(todayVocabChecks >= 2) && (<span className="ml-1 inline-flex items-center justify-center min-w-[30px] h-7 px-1.5 rounded-md bg-rose-500 text-white text-xs font-extrabold shadow-sm border border-white">済</span>)}
                  </div>
                </button>

                <button
                  onClick={() => setTodayModal && setTodayModal('sentence')}
                  className="w-full flex items-center justify-between p-4 rounded-xl bg-white border border-slate-200 hover:border-emerald-400 hover:bg-emerald-50 shadow-sm transition text-left"
                >
                  <span className="flex items-center gap-3">
                    <span className="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center">
                      <MessageCircle size={20} />
                    </span>
                    <span>
                      <span className="block font-bold text-slate-800">短文和訳</span>
                      <span className="block text-xs text-slate-500">全210問</span>
                    </span>
                  </span>
                  <div className="flex gap-1.5">
                    <span className={'inline-flex items-center justify-center w-7 h-7 rounded-md border-2 text-base font-bold shadow-sm transition ' + ((todaySentenceChecks >= 1) ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-slate-300 text-slate-300')}>✓</span>
                    <span className={'inline-flex items-center justify-center w-7 h-7 rounded-md border-2 text-base font-bold shadow-sm transition ' + ((todaySentenceChecks >= 2) ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-slate-300 text-slate-300')}>✓</span>{(todaySentenceChecks >= 2) && (<span className="ml-1 inline-flex items-center justify-center min-w-[30px] h-7 px-1.5 rounded-md bg-rose-500 text-white text-xs font-extrabold shadow-sm border border-white">済</span>)}
                  </div>
                </button>

                <button
                  onClick={() => setTodayModal && setTodayModal('output')}
                  className="w-full flex items-center justify-between p-4 rounded-xl bg-white border border-slate-200 hover:border-amber-400 hover:bg-amber-50 shadow-sm transition text-left"
                >
                  <span className="flex items-center gap-3">
                    <span className="w-10 h-10 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center">
                      <Award size={20} />
                    </span>
                    <span>
                      <span className="block font-bold text-slate-800">アウトプット特訓</span>
                      <span className="block text-xs text-slate-500">全3種類</span>
                    </span>
                  </span>
                  <div className="flex gap-1.5">
                    <span className={'inline-flex items-center justify-center w-7 h-7 rounded-md border-2 text-base font-bold shadow-sm transition ' + ((todayOutputChecks >= 1) ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-slate-300 text-slate-300')}>✓</span>
                    <span className={'inline-flex items-center justify-center w-7 h-7 rounded-md border-2 text-base font-bold shadow-sm transition ' + ((todayOutputChecks >= 2) ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-slate-300 text-slate-300')}>✓</span>
                    <span className={'inline-flex items-center justify-center w-7 h-7 rounded-md border-2 text-base font-bold shadow-sm transition ' + ((todayOutputChecks >= 3) ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-slate-300 text-slate-300')}>✓</span>{(todayOutputChecks >= 3) && (<span className="ml-1 inline-flex items-center justify-center min-w-[30px] h-7 px-1.5 rounded-md bg-rose-500 text-white text-xs font-extrabold shadow-sm border border-white">済</span>)}
                  </div>
                </button>
              </div>
            </div>
          </div>
        )}

        {tab === 'today' && (
           <div className="space-y-6 animate-in fade-in duration-300 max-w-5xl mx-auto w-full pb-8">
              <h2 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                <ListChecks size={18} className="text-emerald-500"/> 今日解いた問題
              </h2>
              {todaysRecords.length === 0 ? (
                <div className="text-center p-6 bg-white rounded-2xl border border-slate-100 text-slate-400 text-sm">
                  今日学習した問題はまだありません。
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {todaysRecords.map((record, idx) => (
                    <div key={idx} className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                      <div className="bg-slate-50 px-4 py-2 border-b border-slate-100 flex justify-between items-center text-xs">
                        <span className="font-bold text-slate-600">{formatModeName(record.mode)}</span>
                        <span className="text-slate-400">{formatDate(record.date).split(' ')[1]}</span>
                      </div>
                      <div className="divide-y divide-slate-100">
                         {record.results && record.results.map((q, i) => (
                           <div key={i} className="p-3 flex items-start gap-3">
                             <div className="pt-0.5 shrink-0">
                               {q.isCorrect ? <CheckCircle2 size={16} className="text-emerald-500"/> : <XCircle size={16} className="text-rose-500"/>}
                             </div>
                             <div className="flex-1 min-w-0">
                               <p className="font-bold text-slate-800 text-sm truncate">{q.en}</p>
                               <p className="text-xs text-slate-500 mt-0.5 truncate">{q.ja}</p>
                             </div>
                           </div>
                         ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
           </div>
        )}

        {tab === 'review' && (
          <div className="space-y-8 animate-in fade-in duration-300 max-w-5xl mx-auto w-full pb-8">
            {/* 復習セクション: 優先 */}
            <div>
              <h2 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                <RefreshCw size={18} className="text-rose-500"/> 優先復習リスト
              </h2>
              <p className="text-xs text-slate-500 mb-3 ml-1">1回正解したら復習リストから外れます。何回でも振り返可。</p>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button 
                  onClick={() => onReview(needsReviewWords, 'word')} 
                  disabled={!canReviewWord}
                  className="w-full flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-rose-100 hover:border-rose-400 transition-all disabled:opacity-50 disabled:hover:border-rose-100 active:scale-[0.98]"
                >
                  <div className="text-left">
                    <h3 className="font-bold text-slate-800">単語の復習</h3>
                    {!canReviewWord && needsReviewWords.length > 0 && <p className="text-[10px] text-rose-500">本日の実施回数上限に達しました</p>}
                  </div>
                  <div className="flex items-center gap-3 text-sm font-bold text-rose-500">
                    {needsReviewWords.length}問 <ArrowRight size={16}/>
                  </div>
                </button>
                
                <button 
                  onClick={() => onReview(needsReviewSentences, 'sentence')} 
                  disabled={!canReviewSentence}
                  className="w-full flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-rose-100 hover:border-rose-400 transition-all disabled:opacity-50 disabled:hover:border-rose-100 active:scale-[0.98]"
                >
                  <div className="text-left">
                    <h3 className="font-bold text-slate-800">短文の復習（和訳）</h3>
                    {!canReviewSentence && needsReviewSentences.length > 0 && <p className="text-[10px] text-rose-500">本日の実施回数上限に達しました</p>}
                  </div>
                  <div className="flex items-center gap-3 text-sm font-bold text-rose-500">
                    {needsReviewSentences.length}問 <ArrowRight size={16}/>
                  </div>
                </button>

                <button 
                  onClick={() => onReview(needsReviewWritings, 'writing')} 
                  disabled={!canReviewWriting}
                  className="w-full flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-rose-100 hover:border-rose-400 transition-all disabled:opacity-50 disabled:hover:border-rose-100 active:scale-[0.98] md:col-span-2"
                >
                  <div className="text-left">
                    <h3 className="font-bold text-slate-800">ライティング（書き取り）で復習</h3>
                    <p className="text-[10px] text-slate-500 mt-0.5">書き取りで正解した場合のみ、この復習リストから外れます</p>
                  </div>
                  <div className="flex items-center gap-3 text-sm font-bold text-rose-500">
                    {needsReviewWritings.length}問 <ArrowRight size={16}/>
                  </div>
                </button>
              </div>
            </div>

            {/* 復習セクション: 全履歴 */}
            <div>
              <h2 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                <ListChecks size={18} className="text-indigo-500"/> 過去の全弱点からテスト
              </h2>
              <p className="text-xs text-slate-500 mb-3 ml-1">過去に1度でも間違えたことのある全問題から出題</p>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button 
                  onClick={() => onReview(allWrongWords, 'word')} 
                  disabled={allWrongWords.length === 0}
                  className="w-full flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-indigo-300 transition-all disabled:opacity-50 disabled:hover:border-slate-100 active:scale-[0.98]"
                >
                  <div className="text-left">
                    <h3 className="font-bold text-slate-800">全弱点 単語</h3>
                  </div>
                  <div className="flex items-center gap-3 text-sm font-bold text-indigo-500">
                    全{allWrongWords.length}問 <ArrowRight size={16}/>
                  </div>
                </button>
                
                <button 
                  onClick={() => onReview(allWrongSentences, 'sentence')} 
                  disabled={allWrongSentences.length === 0}
                  className="w-full flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-indigo-300 transition-all disabled:opacity-50 disabled:hover:border-slate-100 active:scale-[0.98]"
                >
                  <div className="text-left">
                    <h3 className="font-bold text-slate-800">全弱点 短文</h3>
                  </div>
                  <div className="flex items-center gap-3 text-sm font-bold text-indigo-500">
                    全{allWrongSentences.length}問 <ArrowRight size={16}/>
                  </div>
                </button>
              </div>
            </div>

            {/* 学習履歴セクション (カレンダー) */}
            <div>
              <h2 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                <CalendarDays size={18} className="text-blue-500"/> 学習カレンダー
              </h2>
              
              {/* カレンダーUI */}
              <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4 max-w-2xl">
                <div className="flex justify-between items-center mb-4 px-2">
                  <button onClick={prevMonth} className="p-1 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"><ChevronLeft size={20}/></button>
                  <div className="font-bold text-slate-800">{year}年 {month + 1}月</div>
                  <button onClick={nextMonth} className="p-1 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"><ChevronRight size={20}/></button>
                </div>
                <div className="grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-400 mb-2">
                  <div className="text-rose-400">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div className="text-blue-400">土</div>
                </div>
                <div className="grid grid-cols-7 gap-1 text-center text-sm">
                  {calendarDays.map((day, idx) => {
                    if (!day.isCurrentMonth) return <div key={idx} className="p-1 sm:p-2"></div>;
                    const records = getRecordsForDate(day.dateStr);
                    const hasRecord = records.length > 0;
                    const isSelected = day.dateStr === selectedDateStr;

                    // 7つのチェック達成数を集計（vocab: 0-2, sentence: 0-2, outputs: 0-3）
                    let vocabCnt = 0, sentenceCnt = 0;
                    const outputSet = new Set();
                    records.forEach(r => {
                      const m = r && r.mode;
                      if (typeof m !== 'string') return;
                      if (m === 'word' || m.startsWith('word_')) {
                        vocabCnt = Math.min(2, vocabCnt + 1);
                      } else if (m === 'sentence' || m.startsWith('sentence_')) {
                        sentenceCnt = Math.min(2, sentenceCnt + 1);
                      } else if (m === 'listening') {
                        outputSet.add('listening');
                      } else if (m.startsWith('writing') && m !== 'review_writing') {
                        outputSet.add('writing');
                      } else if (m.startsWith('speaking')) {
                        outputSet.add('speaking');
                      }
                    });
                    const totalChecks = vocabCnt + sentenceCnt + outputSet.size;

                    // 0個→変更なし、1〜6個→薄い黄、7個全部→薄い青
                    let dayBgClass = 'hover:bg-slate-100';
                    if (!isSelected) {
                      if (totalChecks >= 7) dayBgClass = 'bg-blue-100 hover:bg-blue-200';
                      else if (totalChecks >= 1) dayBgClass = 'bg-yellow-100 hover:bg-yellow-200';
                    }

                    return (
                      <button 
                        key={idx}

              </h2>

              <div className="space-y-4 max-w-md">

                   >
                     <div className="w-10 h-10 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-2"><Download size={20}/></div>
                     <h3 className="font-bold text-slate-800 text-sm">書き出す(ファイル)</h3>
                   </button>

                   <button 
                    onClick={triggerFileInput}

                   >
                     <div className="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mb-2"><Upload size={20}/></div>
                     <h3 className="font-bold text-slate-800 text-sm">読み込む(ファイル)</h3>

      {/* カレンダー履歴ポップアップモーダル */}
      {showHistoryModal && (
        <div className="absolute inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200">
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-xl flex flex-col max-h-[80vh]">
            <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
              <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                <CalendarDays size={20} className="text-blue-500" />
                {selectedDate.getMonth() + 1}月{selectedDate.getDate()}日の記録
              </h3>
              <button onClick={() => setShowHistoryModal(false)} className="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200 hover:text-slate-800 transition-colors">
                <XCircle size={20} />
              </button>
            </div>
            
            <div className="overflow-y-auto space-y-3 flex-1 pr-2 no-scrollbar">
              {selectedDateRecords.length === 0 ? (
                <div className="text-center p-6 bg-slate-50 rounded-2xl border border-slate-100 text-slate-400 text-sm">
                  この日の学習記録はありません。
                </div>
              ) : (
                <div className="space-y-3">
                  {Object.keys(selectedDateRecords.reduce((acc, record) => {
                    if (!acc[record.mode]) acc[record.mode] = [];
                    acc[record.mode].push(record);
                    return acc;
                  }, {})).map(mode => {
                    const recs = selectedDateRecords.filter(r => r.mode === mode).sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());
                    const firstRec = recs[0];
                    const secondRec = recs[1];

                      <div key={mode} className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col gap-3">

                          </div>

};

// 結果画面 (解いた問題のリスト付き)

  let message = "";
  if (percentage === 100) message = "パーフェクト！素晴らしい！";
  else if (percentage >= 80) message = "よくできました！";
  else if (percentage >= 60) message = "あともう少し！頑張ろう！";
  else message = "次はもっとできるはず！復習しよう。";

  return (
    <div className="h-full flex flex-col bg-white overflow-y-auto">
      <div className="p-6 flex flex-col items-center text-center pb-8 border-b border-slate-100 shrink-0">
        <div className="w-20 h-20 bg-yellow-100 text-yellow-500 rounded-full flex items-center justify-center mb-4 shadow-inner animate-bounce">
          <Award size={48} />
        </div>
        
        <h2 className="text-2xl font-black text-slate-800 mb-1">結果発表</h2>
        <p className="text-slate-500 mb-6 font-medium text-sm">{message}</p>
        
        <div className="bg-slate-50 w-full max-w-md rounded-2xl p-4 mb-4 border border-slate-100 shadow-sm flex flex-col items-center">
          <div className="text-xs text-slate-500 mb-1">今回の正答率</div>
          <div className="flex items-end justify-center gap-2">
            <span className="text-5xl font-black text-blue-600">{percentage}<span className="text-2xl">%</span></span>
          </div>
          <div className="mt-1 text-slate-400 font-medium text-sm">({score} / {total} 問正解)</div>
        </div>

        <button 
          onClick={onBack}
          className="w-full max-w-md py-5 bg-slate-800 text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-slate-700 active:scale-[0.98] transition-all flex justify-center items-center gap-3 min-h-[60px]"
        >
          <Home size={26} /> ホームに戻る
        </button>
      </div>

      {/* 解いた問題のリスト表示 */}
      <div className="p-6 bg-slate-50 flex-1">
        <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2 text-sm max-w-5xl mx-auto w-full"><ListChecks size={18}/> 今回のテスト問題</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-w-5xl mx-auto w-full">
          {results && results.map((r, idx) => (
            <div key={idx} className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex items-start gap-3">
               <div className="pt-0.5 shrink-0">
                 {r.isCorrect ? <CheckCircle2 size={18} className="text-emerald-500"/> : <XCircle size={18} className="text-rose-500"/>}
               </div>
               <div className="flex-1 min-w-0">
                 <p className="font-bold text-slate-800 text-sm truncate">{r.item.en}</p>
                 <p className="text-xs text-slate-500 mt-0.5 truncate">{r.item.ja}</p>
               </div>
               <button onClick={() => speakText(r.item.en)} className="p-1 shrink-0 text-slate-300 hover:text-blue-500 transition-colors"><Volume2 size={16}/></button>
            </div>
          ))}
        </div>
      </div>

};

// --- 今日の学習: ホーム画面ラッパー ---
function TodayStudyHome({ dailyChecks, todayModal, setTodayModal, onStart, statsData, historyData, onReview, onExportText, onImportText }) {
  const vocabChecks = (dailyChecks && dailyChecks.vocab) || 0;
  const sentenceChecks = (dailyChecks && dailyChecks.sentence) || 0;
  const outputDoneList = (dailyChecks && dailyChecks.outputs) || [];
  const outputChecks = outputDoneList.length;

  // statsData からモード別に「すでに正答した問題数」を推定（無ければ0）
  const solvedCount = (mode) => {
    if (!statsData) return 0;
    const s = statsData[mode];
    if (!s) return 0;
    if (typeof s.solved === 'number') return s.solved;
    if (typeof s.uniqueCorrect === 'number') return s.uniqueCorrect;
    if (typeof s.correct === 'number') return s.correct;
    return 0;
  };

  const renderChecks = (count, total) => {
    const items = [];
    for (let i = 0; i < total; i++) {
      items.push(
        <span
          key={i}
          className={
            'inline-flex items-center justify-center w-7 h-7 rounded-md border-2 text-base font-bold shadow-sm transition ' +
            (i < count ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-slate-300 text-slate-300')
          }
        >
          ✓
        </span>
      );
    }
    return <div className="flex gap-1.5">{items}</div>;
  };

  const wordChoices = [
    { label: '基本', mode: 'word_basic', grade: '小学校レベル', total: WORDS_BASIC.length },
    { label: 'Lv.1', mode: 'word_lvl1', grade: '小学校〜中1', total: WORDS_LEVEL1.length },
    { label: 'Lv.2', mode: 'word_lvl2', grade: '中2レベル', total: WORDS_LEVEL2.length },
    { label: 'Lv.3', mode: 'word_lvl3', grade: '中3レベル', total: WORDS_LEVEL3.length },
    { label: 'Lv.4', mode: 'word_lvl4', grade: '高校受験〜高1', total: WORDS_LEVEL4.length },
  ].map((c) => ({ ...c, remaining: Math.max(0, c.total - solvedCount(c.mode)) }));

  const sentenceChoices = [
    { label: '基本', mode: 'sentence_basic', grade: '中1レベル', total: SENTENCES_BASIC.length },
    { label: 'Lv.1', mode: 'sentence_lvl1', grade: '中1後半〜中2前半', total: SENTENCES_LEVEL1.length },
    { label: 'Lv.2', mode: 'sentence_lvl2', grade: '中2レベル', total: SENTENCES_LEVEL2.length },
    { label: 'Lv.3', mode: 'sentence_lvl3', grade: '中3レベル', total: SENTENCES_LEVEL3.length },
  ].map((c) => ({ ...c, remaining: Math.max(0, c.total - solvedCount(c.mode)) }));

  const [outputStage, setOutputStage] = useState(null); // null | 'speaking' | 'writing'
  useEffect(() => {
    if (todayModal !== 'output') setOutputStage(null);
  }, [todayModal]);

  const outputChoices = [
    { label: 'リスニング（聞き取り）', mode: 'listening', done: outputDoneList.includes('listening') },
    { label: 'スピーキング（音読）', mode: '__speaking', done: outputDoneList.includes('speaking') },
    { label: 'ライティング（書き取り）', mode: '__writing', done: outputDoneList.includes('writing') },
  ];

  const speakingChoices = [
    { label: '基本', mode: 'speaking_basic', grade: '中1レベル', total: SENTENCES_BASIC.length, remaining: SENTENCES_BASIC.length },
    { label: 'Lv.1', mode: 'speaking_lvl1', grade: '中1後半〜中2前半', total: SENTENCES_LEVEL1.length, remaining: SENTENCES_LEVEL1.length },
    { label: 'Lv.2', mode: 'speaking_lvl2', grade: '中2レベル', total: SENTENCES_LEVEL2.length, remaining: SENTENCES_LEVEL2.length },
    { label: 'Lv.3', mode: 'speaking_lvl3', grade: '中3レベル', total: SENTENCES_LEVEL3.length, remaining: SENTENCES_LEVEL3.length },
  ];

  const writingChoices = [
    { label: '基本', mode: 'writing_basic', grade: '中1レベル', total: SENTENCES_BASIC.length, remaining: SENTENCES_BASIC.length },
    { label: 'Lv.1', mode: 'writing_lvl1', grade: '中1後半〜中2前半', total: SENTENCES_LEVEL1.length, remaining: SENTENCES_LEVEL1.length },
    { label: 'Lv.2', mode: 'writing_lvl2', grade: '中2レベル', total: SENTENCES_LEVEL2.length, remaining: SENTENCES_LEVEL2.length },
    { label: 'Lv.3', mode: 'writing_lvl3', grade: '中3レベル', total: SENTENCES_LEVEL3.length, remaining: SENTENCES_LEVEL3.length },
  ];

  return (
    <div className="h-full overflow-y-auto">
      <HomeView
        onStart={onStart}
        statsData={statsData}
        historyData={historyData}
        onReview={onReview}
        onExportText={onExportText}
        onImportText={onImportText}
        dailyChecks={dailyChecks}
        setTodayModal={setTodayModal}
      />

      {todayModal === 'word' && (
        <TodayChoiceModal
          title="どの難易度にしますか？"
          subtitle="一問一答"
          message="一日に2回、問題を解きましょう（80点以上で2つチェック）"
          variant="level"
          choices={wordChoices}
          onPick={(m) => { setTodayModal(null); onStart(m); }}
          onClose={() => setTodayModal(null)}
        />
      )}
      {todayModal === 'sentence' && (
        <TodayChoiceModal
          title="どの難易度にしますか？"
          subtitle="短文和訳"
          message="一日に2回、問題を解きましょう（80点以上で2つチェック）"
          variant="level"
          choices={sentenceChoices}
          onPick={(m) => { setTodayModal(null); onStart(m); }}
          onClose={() => setTodayModal(null)}
        />
      )}
      {todayModal === 'output' && outputStage === null && (
        <TodayChoiceModal
          title="どの種類にしますか？"
          subtitle="アウトプット特訓"
          message="一日に3種類すべてを解きましょう（80点以上でチェック）"
          variant="output"
          choices={outputChoices}
          onPick={(m) => {
            if (m === '__speaking') setOutputStage('speaking');
            else if (m === '__writing') setOutputStage('writing');
            else { setTodayModal(null); onStart(m); }
          }}
          onClose={() => setTodayModal(null)}
        />
      )}
      {todayModal === 'output' && outputStage === 'speaking' && (
        <TodayChoiceModal
          title="どの難易度にしますか？"
          subtitle="スピーキング（音読）"
          message="同じレベルなら短文和訳・ライティングと同じ問題から出題"
          variant="level"
          choices={speakingChoices}
          onPick={(m) => { setTodayModal(null); setOutputStage(null); onStart(m); }}
          onClose={() => setOutputStage(null)}
        />
      )}
      {todayModal === 'output' && outputStage === 'writing' && (
        <TodayChoiceModal
          title="どの難易度にしますか？"
          subtitle="ライティング（書き取り）"
          message="同じレベルなら短文和訳・スピーキングと同じ問題から出題"
          variant="level"
          choices={writingChoices}
          onPick={(m) => { setTodayModal(null); setOutputStage(null); onStart(m); }}
          onClose={() => setOutputStage(null)}
        />
      )}
    </div>
  );
}

// --- 今日の学習: 選択モーダル ---

}

// --- メインアプリケーション ---
export default function App() {
  const [currentView, setCurrentView] = useState('home'); 
  const [testMode, setTestMode] = useState(''); 
  const [questions, setQuestions] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [score, setScore] = useState(0);
  
  const [user, setUser] = useState(null);
  const [historyData, setHistoryData] = useState([]);
  const [statsData, setStatsData] = useState([]);
  const testResultsRef = useRef([]);
  const [showConfirm, setShowConfirm] = useState(false);

  // --- 今日の学習: 日次チェック管理 ---
  const todayKey = () => {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  };
  const DAILY_KEY = STORAGE_PREFIX + 'dailyChecks';
  const loadDailyChecks = () => {
    const raw = safeJsonParse(safeGetItem(DAILY_KEY));
    if (!raw || raw.date !== todayKey()) {
      return { date: todayKey(), vocab: 0, sentence: 0, outputs: [] };
    }
    return raw;
  };
  const [dailyChecks, setDailyChecks] = useState(loadDailyChecks);
  const [todayModal, setTodayModal] = useState(null);

  // 1. 認証 (Rule 3)
  useEffect(() => {
    if (!auth) return;
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (e) {
        console.error("Auth error:", e);
      }
    };
    initAuth();
    
    const unsubscribe = onAuthStateChanged(auth, setUser);
    return () => unsubscribe();
  }, []);

  // 2. データ取得 (Firestore Listeners)
  useEffect(() => {
    if (!user || !db) return;

    const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'history');
    const unsubHistory = onSnapshot(historyRef, (snap) => {
      const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      data.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
      setHistoryData(data);
    }, (error) => console.error("History fetch error:", error));

    const statsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'items_stats');
    const unsubStats = onSnapshot(statsRef, (snap) => {
      const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      setStatsData(data);
    }, (error) => console.error("Stats fetch error:", error));

    return () => {
      unsubHistory();
      unsubStats();
    };
  }, [user]);

  // データ書き出し（テキスト）
  const handleExportText = () => {
    const exportData = { history: historyData, stats: statsData };
    return JSON.stringify(exportData);
  };

  // データ読み込み（テキスト）
  const handleImportText = async (jsonString) => {
    if (!user || !db) return;
    
    if(!window.confirm("現在のデータに上書き・追加されます。よろしいですか？")) {
       return;
    }

    try {
      const importedData = JSON.parse(jsonString);
      
      if (importedData && (importedData.stats || importedData.history)) {
         const statsToImport = Array.isArray(importedData.stats) ? importedData.stats : [];
         const historyToImport = Array.isArray(importedData.history) ? importedData.history : [];
         
         let batch = writeBatch(db);
         let operationCount = 0;

         const commitBatch = async () => {
           if (operationCount > 0) {
             await batch.commit();
             batch = writeBatch(db); 
             operationCount = 0;
           }
         };

         // stats復元
         for (const stat of statsToImport) {
            if(!stat.en) continue;
            const statId = stat.id ? String(stat.id) : stat.en.replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 50);
            const statRef = doc(db, 'artifacts', appId, 'users', user.uid, 'items_stats', statId);
            const { id, ...dataToSave } = stat; 
            batch.set(statRef, dataToSave, { merge: true });
            operationCount++;
            if (operationCount >= 400) await commitBatch();
         }
         
         // history復元
         const historyRefCollection = collection(db, 'artifacts', appId, 'users', user.uid, 'history');
         for (const hist of historyToImport) {
            if(!hist.date || !hist.mode) continue;
            if (hist.id && typeof hist.id === 'string' && hist.id.trim() !== '') {
              const { id, ...histData } = hist;
              const histRef = doc(db, 'artifacts', appId, 'users', user.uid, 'history', hist.id);
              batch.set(histRef, histData, { merge: true });
            } else {
              const newHistRef = doc(historyRefCollection); 
              batch.set(newHistRef, hist);
            }
            operationCount++;
            if (operationCount >= 400) await commitBatch();
         }
         
         await commitBatch(); 
         
         alert("データの読み込みが完了しました！");
      } else {
         alert("有効なバックアップデータではありません。");
      }
    } catch (err) {
      alert("データの読み込み中にエラーが発生しました。テキストが正しく貼り付けられていない可能性があります。\n" + (err.message || ""));
      console.error(err);
    }
  };

  const startTest = (mode) => {
    setTestMode(mode);
    setScore(0);
    setCurrentIndex(0);
    testResultsRef.current = []; 
    
    let targetData = [];
    let listeningIsDayFixed = false;
    if (mode === 'word_basic') targetData = WORDS_BASIC;
    else if (mode === 'word_lvl1') targetData = WORDS_LEVEL1;
    else if (mode === 'word_lvl2') targetData = WORDS_LEVEL2;
    else if (mode === 'word_lvl3') targetData = WORDS_LEVEL3;
    else if (mode === 'word_lvl4') targetData = WORDS_LEVEL4;
    else if (mode === 'sentence_basic') targetData = SENTENCES_BASIC;
    else if (mode === 'sentence_lvl1') targetData = SENTENCES_LEVEL1;
    else if (mode === 'sentence_lvl2') targetData = SENTENCES_LEVEL2;
    else if (mode === 'sentence_lvl3') targetData = SENTENCES_LEVEL3;
    else if (mode === 'sentence_lvl4') targetData = SENTENCES_LEVEL4;
    else if (mode === 'sentence_lvl5') targetData = SENTENCES_LEVEL5;
    // 案 Y: スピーキング・ライティングもレベルごとに短文和訳と同じ SENTENCES_LEVEL{N} を使う
    else if (mode === 'writing_basic' || mode === 'speaking_basic') targetData = SENTENCES_BASIC;
    else if (mode === 'writing_lvl1' || mode === 'speaking_lvl1') targetData = SENTENCES_LEVEL1;
    else if (mode === 'writing_lvl2' || mode === 'speaking_lvl2') targetData = SENTENCES_LEVEL2;
    else if (mode === 'writing_lvl3' || mode === 'speaking_lvl3') targetData = SENTENCES_LEVEL3;
    else if (mode === 'writing' || mode === 'speaking') targetData = SENTENCES_LEVEL1; // 旧モード後方互換
    else if (mode === 'listening') {
      // 今日の一問一答 (word_*) で出題された単語のみから、日付固定の10問を選ぶ
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      const seen = new Set();
      historyData.forEach(r => {
        if (!r || typeof r.mode !== 'string' || !r.mode.startsWith('word_')) return;
        const d = new Date(r.date);
        const dStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        if (dStr !== todayStr) return;
        if (Array.isArray(r.results)) {
          r.results.forEach(item => { if (item && item.en) seen.add(item.en); });
        }
      });
      const filtered = ALL_WORDS.filter(w => seen.has(w.en));
      // 今日の学習が無い場合はクラッシュ回避のため、デフォルトプールへフォールバック
      const pool = filtered.length > 0 ? filtered : [...WORDS_BASIC, ...WORDS_LEVEL1];
      const seed = parseInt(todayStr.replace(/-/g, ''), 10) || 0;
      const hashKey = (s) => {
        let h = seed;
        for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
        return h;
      };
      targetData = pool
        .map(w => ({ w, k: hashKey(w.en) }))
        .sort((a, b) => a.k - b.k)
        .slice(0, 10)
        .map(x => x.w);
      listeningIsDayFixed = true;
    }
    
    const count = mode.includes('word') || mode === 'listening' ? 10 : 5;
    const picked = listeningIsDayFixed ? targetData : shuffle(targetData).slice(0, count);
    setQuestions(picked);

    // viewの決定
    let nextView = '';
    if (mode.includes('word')) nextView = 'word';
    else if (mode.includes('sentence')) nextView = 'sentence';
    else if (mode.startsWith('writing')) nextView = 'writing';
    else if (mode.startsWith('speaking')) nextView = 'speaking';
    else if (mode === 'listening') nextView = 'listening';
    else nextView = mode;
    
    setCurrentView(nextView);
  };

  const startReviewTest = (reviewItems, type) => {
    const targetQuestions = shuffle([...reviewItems]).slice(0, 10).map(item => ({ en: item.en, ja: item.ja }));
    setQuestions(targetQuestions);
    setTestMode(type === 'word' ? 'review_word' : type === 'writing' ? 'review_writing' : 'review_sentence');
    setCurrentIndex(0);
    setScore(0);
    testResultsRef.current = [];
    setCurrentView(type === 'word' ? 'word' : type === 'writing' ? 'writing' : 'sentence'); 
  };

  const handleAnswer = (isCorrect) => {
    const isSentenceMode = ['sentence', 'review_sentence', 'writing', 'speaking'].includes(currentView) || testMode.includes('sentence');
    const type = isSentenceMode ? 'sentence' : 'word';
    testResultsRef.current.push({ item: questions[currentIndex], isCorrect, type });
  };

  const finishTest = async () => {
    const isOutputMode = testMode === 'listening' || (typeof testMode === 'string' && (testMode.startsWith('writing') || testMode.startsWith('speaking'))) && testMode !== 'review_writing';
    const hasResults = testResultsRef.current.length > 0;
    if (user && db && (hasResults || (isOutputMode && questions.length > 0))) {
      try {
        const finalScore = hasResults ? testResultsRef.current.filter(r => r.isCorrect).length : score;
        const total = hasResults ? testResultsRef.current.length : questions.length;
        
        const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'history');
        await addDoc(historyRef, {
          date: new Date().toISOString(),
          mode: testMode,
          score: finalScore,
          total: total,
          accuracy: total > 0 ? Math.round((finalScore / total) * 100) : 0,
          results: hasResults
            ? testResultsRef.current.map(r => ({ en: r.item.en, ja: r.item.ja, isCorrect: r.isCorrect }))
            : questions.map((q, i) => ({ en: q.en, ja: q.ja, isCorrect: i < finalScore }))
        });

        const promises = testResultsRef.current.map(async (res) => {
          const safeId = res.item.en.replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 50); 
          const statRef = doc(db, 'artifacts', appId, 'users', user.uid, 'items_stats', safeId);
          
          const snap = await getDoc(statRef);
          let data = snap.exists() ? snap.data() : { en: res.item.en, ja: res.item.ja, correctCount: 0, wrongCount: 0, type: res.type, reviewCorrectCount: 0, needsReview: false, needsWritingReview: false };
          
          if (data.reviewCorrectCount === undefined) data.reviewCorrectCount = 0;
          if (data.needsReview === undefined) data.needsReview = data.wrongCount > 0;
          if (data.needsWritingReview === undefined) data.needsWritingReview = data.wrongCount > 0 && data.type === 'sentence';
          
          if (res.isCorrect) {
            data.correctCount += 1;
            data.reviewCorrectCount += 1;
            if (data.reviewCorrectCount >= 1) data.needsReview = false;
            // ライティング復習フラグは writing / review_writing モードでの正解時のみクリア
            if (testMode === 'writing' || testMode === 'review_writing') {
              data.needsWritingReview = false;
            }
          } else {
            data.wrongCount += 1;
            data.reviewCorrectCount = 0; 
            data.needsReview = true; 
            if (data.type === 'sentence') data.needsWritingReview = true;
          }
          data.lastResult = res.isCorrect;
          
          await setDoc(statRef, data);
        });
        await Promise.all(promises);
      } catch(e) {
        console.error("Save error:", e);
      }
    }
    // 今日の学習: 完了チェックを更新
    try {
      const checks = loadDailyChecks();
      if (testMode.startsWith('word_')) {
        checks.vocab = Math.min(2, (checks.vocab || 0) + 1);
      } else if (testMode.startsWith('sentence_')) {
        checks.sentence = Math.min(2, (checks.sentence || 0) + 1);
      } else {
        let outputKey = null;
        if (testMode === 'listening') outputKey = 'listening';
        else if (typeof testMode === 'string' && testMode.startsWith('writing') && testMode !== 'review_writing') outputKey = 'writing';
        else if (typeof testMode === 'string' && testMode.startsWith('speaking')) outputKey = 'speaking';
        if (outputKey) {
          if (!Array.isArray(checks.outputs)) checks.outputs = [];
          if (!checks.outputs.includes(outputKey)) checks.outputs.push(outputKey);
        }
      }
      safeSetItem(DAILY_KEY, JSON.stringify(checks));
      setDailyChecks(checks);
    } catch (e) {
      console.warn('dailyChecks update failed:', e);
    }
    setCurrentView('result');
  };

  const renderView = () => {
    switch (currentView) {
      case 'home': 
        return <TodayStudyHome dailyChecks={dailyChecks} todayModal={todayModal} setTodayModal={setTodayModal} onStart={startTest} statsData={statsData} historyData={historyData} onReview={startReviewTest} onExportText={handleExportText} onImportText={handleImportText} />;
      case 'word': 
        return <WordTest questions={questions} currentIndex={currentIndex} setCurrentIndex={setCurrentIndex} score={score} setScore={setScore} onFinish={finishTest} wordsData={ALL_WORDS} onAnswer={handleAnswer} />;
      case 'sentence': 
        return <SentenceTest questions={questions} currentIndex={currentIndex} setCurrentIndex={setCurrentIndex} score={score} setScore={setScore} onFinish={finishTest} onAnswer={handleAnswer} />;
      case 'listening': 
        return <ListeningTest questions={questions} currentIndex={currentIndex} setCurrentIndex={setCurrentIndex} score={score} setScore={setScore} onFinish={finishTest} onAnswer={handleAnswer} />;
      case 'writing': 
        return <WritingTest questions={questions} currentIndex={currentIndex} setCurrentIndex={setCurrentIndex} score={score} setScore={setScore} onFinish={finishTest} onAnswer={handleAnswer} />;
      case 'speaking': 
        return <SpeakingTest questions={questions} currentIndex={currentIndex} setCurrentIndex={setCurrentIndex} score={score} setScore={setScore} onFinish={finishTest} onAnswer={handleAnswer} />;
      case 'result': 
        return <ResultView score={score} total={questions.length} mode={testMode} results={testResultsRef.current} onBack={() => setCurrentView('home')} />;
      default: 
        return <TodayStudyHome dailyChecks={dailyChecks} todayModal={todayModal} setTodayModal={setTodayModal} onStart={startTest} statsData={statsData} historyData={historyData} onReview={startReviewTest} onExportText={handleExportText} onImportText={handleImportText} />;
    }
  };

  return (
    <div className="fixed inset-0 bg-slate-100 font-sans flex justify-center items-center">
      <div className="w-full h-full bg-white shadow-2xl overflow-hidden flex flex-col relative">
        
        {/* ヘッダー */}
        <div className="bg-white text-slate-800 px-4 sm:px-6 py-3 sm:py-4 border-b border-slate-100 flex justify-between items-center z-20 relative shadow-sm shrink-0">
            <span className="font-extrabold text-lg flex items-center gap-2">
              <span className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center text-sm shadow-inner">英</span>
              EnglishMaster
            </span>
            {currentView !== 'home' && currentView !== 'result' && (
                <button 
                  onClick={() => setShowConfirm(true)} 
                  className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-full transition"
                  title="ホームに戻る"
                >
                  <Home size={20}/>
                </button>
            )}
        </div>

        {/* 中断確認モーダル */}
        <ConfirmModal 
          isOpen={showConfirm} 
          title="テストを終了しますか？"
          message="現在の進行状況や正解・不正解の記録は保存されません。"
          onCancel={() => setShowConfirm(false)}
          onConfirm={() => {
            setShowConfirm(false);
            setCurrentView('home');
          }}
        />

        {/* メインコンテンツエリア */}
        <div className="flex-1 overflow-hidden relative bg-slate-50/50">
           {renderView()}
        </div>
      </div>
    </div>
  );
}

    // --- アプリのマウント ---
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
