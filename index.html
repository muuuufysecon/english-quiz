  <style>
    html, body { margin: 0; padding: 0; }
    /* 初回ロード中の表示 */
    #root:empty::before {
      content: "読み込み中…（初回は 5〜10 秒ほどかかります）";
      display: block;
      padding: 2rem;
      text-align: center;
      color: #666;
      font-family: sans-serif;
    }

<body>
  <div id="root"></div>
  <noscript>このアプリは JavaScript を使用します。ブラウザで JavaScript を有効にしてください。</noscript>

  <!-- エラーを画面に表示するハンドラ（デバッグ用） -->
  <script>
    (function () {
      var shown = false;
      var showError = function (title, detail) {
        shown = true;
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '';
        var box = document.createElement('div');
        box.style.cssText = 'padding:1.5rem;margin:1rem;font-family:sans-serif;color:#b91c1c;background:#fee2e2;border:1px solid #ef4444;border-radius:8px;';
        var h = document.createElement('h2');
        h.textContent = title;
        h.style.cssText = 'margin:0 0 0.5rem;font-size:1.1rem;';
        var pre = document.createElement('pre');
        pre.textContent = detail;
        pre.style.cssText = 'white-space:pre-wrap;word-break:break-all;font-size:0.85rem;line-height:1.5;margin:0;';
        box.appendChild(h);
        box.appendChild(pre);
        root.appendChild(box);
      };
      window.addEventListener('error', function (ev) {
        showError('スクリプトエラー',
          (ev.message || '') + '\nat ' + (ev.filename || '?') + ':' + ev.lineno + ':' + ev.colno + '\n' +
          (ev.error && ev.error.stack ? ev.error.stack : ''));
      });
      window.addEventListener('unhandledrejection', function (ev) {
        var r = ev.reason || {};
        showError('Promise エラー', (r.message || String(r)) + '\n' + (r.stack || ''));
      });
      setTimeout(function () {
        if (shown) return;
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          showError('読み込みタイムアウト（15秒）',
            'React アプリのマウントに15秒以上かかっています。\n\n考えられる原因:\n' +
            '・ファイルをダブルクリック（file://）で開いている場合、一部のブラウザが ES モジュールの読み込みを拒否します。\n' +
            '  → 解決: VSCode の Live Server などのローカル HTTP サーバ経由で開く、または GitHub Pages にアップして試す\n' +
            '・ネット接続が無い／esm.sh・unpkg.com がブロックされている\n' +
            '・JavaScript の構文エラー（F12 を押して「Console」タブの赤いエラーを確認）');
        }
      }, 15000);
    })();
  </script>

  <!-- iOS Safari 用 SpeechRecognition フォールバック（文字入力で代用） -->
  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      // iPadOS 13+ は "Macintosh" を名乗るがタッチ可（=実機 iPad）
      if (!isIOS && ua.indexOf('Macintosh') !== -1 && navigator.maxTouchPoints > 1) {
        isIOS = true;
      }
      if (!isIOS) return;
      // ネイティブ実装があり、かつインスタンス化できるなら触らない
      var Native = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (Native) {
        try {
          new Native();
          return;
        } catch (e) {
          // 失敗 → フォールバックへ
        }
      }
      function FallbackRecognition() {
        this.lang = 'en-US';
        this.continuous = false;
        this.interimResults = false;
        this.maxAlternatives = 1;
        this.onstart = null;
        this.onresult = null;
        this.onerror = null;
        this.onend = null;
        this.onspeechstart = null;
        this.onspeechend = null;
        this.onaudiostart = null;
        this.onaudioend = null;
      }
      // 入力ダイアログを DOM で作る（prompt() は iOS でユーザージェスチャーが
      // 切れていると表示されず null を返すことがあるため、DOM ベースで実装）
      FallbackRecognition.prototype.start = function () {
        var self = this;
        // onstart は同期で発火
        if (typeof self.onstart === 'function') {
          try { self.onstart({}); } catch (e) {}
        }
        // 二重起動防止
        if (document.querySelector('[data-fallback-mic="1"]')) return;

        var modal = document.createElement('div');
        modal.setAttribute('data-fallback-mic', '1');
        modal.style.cssText = 'position:fixed;inset:0;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:16px;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;';
        var inner = document.createElement('div');
        inner.style.cssText = 'background:#fff;border-radius:14px;max-width:380px;width:100%;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,0.3);box-sizing:border-box;';
        var title = document.createElement('div');
        title.textContent = '🎤 文字入力で代用';
        title.style.cssText = 'font-weight:700;font-size:15px;margin-bottom:6px;color:#111;';
        var msg = document.createElement('div');
        msg.textContent = 'iPhone / iPad の Safari は音声認識に対応していません。回答を文字で入力してください。';
        msg.style.cssText = 'font-size:12.5px;color:#555;line-height:1.5;margin-bottom:10px;';
        var input = document.createElement('input');
        input.type = 'text';
        input.setAttribute('autocomplete', 'off');
        input.setAttribute('autocapitalize', 'off');
        input.setAttribute('autocorrect', 'off');
        input.setAttribute('spellcheck', 'false');
        input.style.cssText = 'width:100%;box-sizing:border-box;padding:9px 10px;font-size:16px;border:1px solid #d1d5db;border-radius:8px;outline:none;margin-bottom:12px;';
        var btnRow = document.createElement('div');
        btnRow.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;';
        var cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.textContent = 'キャンセル';
        cancelBtn.style.cssText = 'padding:8px 14px;border:1px solid #d1d5db;background:#f9fafb;border-radius:8px;font-size:13px;cursor:pointer;color:#374151;';
        var okBtn = document.createElement('button');
        okBtn.type = 'button';
        okBtn.textContent = 'OK';
        okBtn.style.cssText = 'padding:8px 16px;border:none;background:#3b82f6;color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;';
        btnRow.appendChild(cancelBtn);
        btnRow.appendChild(okBtn);
        inner.appendChild(title);
        inner.appendChild(msg);
        inner.appendChild(input);
        inner.appendChild(btnRow);
        modal.appendChild(inner);
        (document.body || document.documentElement).appendChild(modal);
        setTimeout(function () { try { input.focus(); } catch (e) {} }, 30);

        var done = false;
        var finish = function (text) {
          if (done) return;
          done = true;
          try { if (modal.parentNode) modal.parentNode.removeChild(modal); } catch (e) {}
          var trimmed = text != null ? String(text).trim() : '';
          if (trimmed !== '' && typeof self.onresult === 'function') {
            var alt = { transcript: trimmed, confidence: 1 };
            var resultItem = [alt];
            resultItem.isFinal = true;
            resultItem.item = function (i) { return this[i]; };
            var results = [resultItem];
            results.item = function (i) { return results[i]; };
            try {
              self.onresult({ results: results, resultIndex: 0, type: 'result' });
            } catch (e) {}
          } else if (trimmed === '' && typeof self.onerror === 'function') {
            try { self.onerror({ error: 'aborted' }); } catch (e) {}
          }
          if (typeof self.onend === 'function') {
            try { self.onend({}); } catch (e) {}
          }
        };
        okBtn.addEventListener('click', function () { finish(input.value); });
        cancelBtn.addEventListener('click', function () { finish(null); });
        input.addEventListener('keydown', function (ev) {
          if (ev.key === 'Enter') { ev.preventDefault(); finish(input.value); }
          else if (ev.key === 'Escape') { ev.preventDefault(); finish(null); }
        });
        // 背景タップでキャンセル
        modal.addEventListener('click', function (ev) {
          if (ev.target === modal) finish(null);
        });
      };

      // navigator.mediaDevices.getUserMedia を iOS ではダミーストリームで返す
      // （一問一答側がマイク許可を取得しようとしてエラーを吐くケースへの対応）
      try {
        if (navigator && navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function') {
          var origGUM = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
          navigator.mediaDevices.getUserMedia = function (constraints) {
            if (constraints && constraints.audio && !constraints.video) {
              try {
                var AC = window.AudioContext || window.webkitAudioContext;
                if (AC) {
                  var ctx = new AC();
                  var dest = ctx.createMediaStreamDestination();
                  return Promise.resolve(dest.stream);
                }
              } catch (e) {}
              return origGUM(constraints).catch(function () {
                // エラーしてもダミーストリームを返して処理を継続させる
                return { getTracks: function () { return []; }, getAudioTracks: function () { return []; }, getVideoTracks: function () { return []; }, addTrack: function () {}, removeTrack: function () {}, active: false, id: 'fallback-stream' };
              });
            }
            return origGUM(constraints);
          };
        }
      } catch (e) {
        console.warn('[fallback] getUserMedia patch failed:', e);
      }
      FallbackRecognition.prototype.stop = function () {
        if (typeof this.onend === 'function') {
          try { this.onend({}); } catch (e) {}
        }
      };
      FallbackRecognition.prototype.abort = function () {
        if (typeof this.onend === 'function') {
          try { this.onend({}); } catch (e) {}
        }
      };
      FallbackRecognition.prototype.addEventListener = function (type, fn) {
        this['on' + type] = fn;
      };
      FallbackRecognition.prototype.removeEventListener = function (type) {
        this['on' + type] = null;
      };
      window.SpeechRecognition = FallbackRecognition;
      window.webkitSpeechRecognition = FallbackRecognition;
      console.info('[fallback] SpeechRecognition shim installed for iOS Safari');
    })();
  </script>

  <!-- マイクオフ浮遊ボタン（全画面共通） -->
  <script>
    (function () {
      // SpeechRecognition インスタンスを追跡するためのラッパー
      window.__activeRecognitions = window.__activeRecognitions || new Set();
      window.__micOffActive = false;
      ['SpeechRecognition', 'webkitSpeechRecognition'].forEach(function (key) {
        var Original = window[key];
        if (!Original || Original.__micTrackWrapped) return;
        function Wrapped() {
          var instance = new Original();
          // start() をラップして、マイクオフ中は再開を拒否
          var origStart = instance.start && instance.start.bind(instance);
          if (origStart) {
            instance.start = function () {
              if (window.__micOffActive) return;
              try { return origStart(); } catch (e) {}
            };
          }
          try { window.__activeRecognitions.add(instance); } catch (e) {}
          // 連続認識モードでは end の後に同じインスタンスが再開されるため、
          // end では Set から削除しない。error 時のみ追跡を解除する。
          try {
            if (instance.addEventListener) {
              instance.addEventListener('error', function () {
                try { window.__activeRecognitions.delete(instance); } catch (e) {}
              });
            }
          } catch (e) {}
          return instance;
        }
        try { Wrapped.prototype = Original.prototype; } catch (e) {}
        Wrapped.__micTrackWrapped = true;
        try { window[key] = Wrapped; } catch (e) {}
      });

      // グローバルな「マイクをオフ」関数
      window.__stopAllMics = async function () {
        // マイクオフ要求フラグを立てる（start() ラップ側で再開を拒否させる）
        window.__micOffActive = true;
        // 起動中の SpeechRecognition をすべて停止
        try {
          var recs = Array.from(window.__activeRecognitions || []);
          recs.forEach(function (r) {
            // React 側の自動再開コードが走らないよう onend を無効化
            try { r.onend = null; } catch (e) {}
            try { r.continuous = false; } catch (e) {}
            try { r.abort && r.abort(); } catch (e) {}
            try { r.stop && r.stop(); } catch (e) {}
          });
          if (window.__activeRecognitions) window.__activeRecognitions.clear();
        } catch (e) {}
        // 読み上げもキャンセル
        try { if (window.speechSynthesis) window.speechSynthesis.cancel(); } catch (e) {}
        // OSのマイクインジケーターを消すため、ストリームを一度取得して即停止
        try {
          if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(function (t) { try { t.stop(); } catch (e) {} });
          }
        } catch (e) {}
        // 5秒後に再開可能に戻す（次回ボタンで認識を再開できるようにする）
        setTimeout(function () { window.__micOffActive = false; }, 5000);
      };

      // 画面右下にマイクオフボタンを注入
      function injectMicOffButton() {
        if (document.getElementById('__mic-off-fab')) return;
        if (!document.body) return;
        var btn = document.createElement('button');
        btn.id = '__mic-off-fab';
        btn.type = 'button';
        btn.title = 'マイクをオフ（音声認識・読み上げを停止）';
        btn.textContent = '🎙 マイクをオフ';
        btn.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:2147483646;padding:10px 14px;border:none;border-radius:9999px;background:#ef4444;color:#fff;font-size:13px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;box-shadow:0 6px 16px rgba(0,0,0,0.25);cursor:pointer;opacity:0.35;transition:transform 0.15s, opacity 0.15s, background 0.15s;-webkit-tap-highlight-color:transparent;';
        btn.addEventListener('mouseenter', function () { btn.style.opacity = '1'; btn.style.transform = 'scale(1.05)'; });
        btn.addEventListener('mouseleave', function () { btn.style.opacity = '0.35'; btn.style.transform = 'scale(1)'; });
        btn.addEventListener('mousedown', function () { btn.style.opacity = '1'; btn.style.transform = 'scale(0.97)'; });
        btn.addEventListener('mouseup', function () { btn.style.opacity = '1'; btn.style.transform = 'scale(1.05)'; });
        btn.addEventListener('touchstart', function () { btn.style.opacity = '1'; btn.style.transform = 'scale(0.97)'; }, { passive: true });
        btn.addEventListener('touchend', function () { btn.style.opacity = '0.35'; btn.style.transform = 'scale(1)'; });
        btn.addEventListener('touchcancel', function () { btn.style.opacity = '0.35'; btn.style.transform = 'scale(1)'; });
        btn.addEventListener('click', async function () {
          var orig = btn.textContent;
          btn.textContent = '⏳ 停止中…';
          btn.disabled = true;
          btn.style.background = '#9ca3af';
          try { await window.__stopAllMics(); } catch (e) {}
          btn.textContent = '✓ オフにしました';
          btn.style.background = '#10b981';
          setTimeout(function () {
            btn.textContent = orig;
            btn.disabled = false;
            btn.style.background = '#ef4444';
          }, 1800);
        });
        document.body.appendChild(btn);
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', injectMicOffButton);
      } else {
        injectMicOffButton();
      }
      // React マウントの遅れに備えて遅延も設ける
      setTimeout(injectMicOffButton, 1000);
      setTimeout(injectMicOffButton, 3000);
    })();
  </script>

  <!-- 称号・バッヂシステム（案1：武道系 / 独立ウィジェット） -->
  <script>
  (function () {
    'use strict';
    var STORAGE_PREFIX = 'english-quiz:';
    var RANKS = [
      { lv: 1,  name: '英語見習い',       threshold: 0,    icon: '🥋', color: '#9ca3af', desc: '修行はここから' },
      { lv: 2,  name: '単語の使い手',     threshold: 10,   icon: '🗡️', color: '#60a5fa', desc: '基本の構えを習得' },
      { lv: 3,  name: '単語剣士',         threshold: 50,   icon: '⚔️', color: '#2563eb', desc: '戦える単語数に到達' },
      { lv: 4,  name: '文法の達人',       threshold: 150,  icon: '📜', color: '#10b981', desc: '型を極めた者' },
      { lv: 5,  name: 'リスニングの巫女', threshold: 300,  icon: '🎐', color: '#a855f7', desc: '音を聞き分ける耳' },
      { lv: 6,  name: '英語武芸者',       threshold: 500,  icon: '🥷', color: '#7c3aed', desc: '実戦の達人' },
      { lv: 7,  name: '言語の賢者',       threshold: 1000, icon: '🧙', color: '#f59e0b', desc: '英語の理を解く' },
      { lv: 8,  name: '辞書喰らい',       threshold: 1500, icon: '📚', color: '#ef4444', desc: '辞書一冊を平らげた' },
      { lv: 9,  name: '言霊使い',         threshold: 2000, icon: '✨', color: '#ec4899', desc: '言葉に魂を宿す' },
      { lv: 10, name: '英語仙人',         threshold: 3000, icon: '🐉', color: '#dc2626', desc: '英語の頂にて' }
    ];
    window.__ENGLISH_QUIZ_RANKS = RANKS;

    function safeParse(raw) { try { return JSON.parse(raw); } catch (e) { return null; } }

    // localStorage の履歴データから累計正解数を集計（スキーマに柔軟対応）
    function countCorrect() {
      var count = 0;
      var len = 0;
      try { len = localStorage.length; } catch (e) { return 0; }
      for (var i = 0; i < len; i++) {
        var key = null;
        try { key = localStorage.key(i); } catch (e) { continue; }
        if (!key || key.indexOf(STORAGE_PREFIX) !== 0) continue;
        if (!/(\/history\/|\/results\/|\/sessions\/|\/answers\/|\/log\/|\/quiz\/)/.test(key)) continue;
        var raw = null;
        try { raw = localStorage.getItem(key); } catch (e) { continue; }
        if (!raw) continue;
        var data = safeParse(raw);
        if (!data || typeof data !== 'object') continue;
        if (data.correct === true || data.isCorrect === true || data.is_correct === true) {
          count++;
        } else if (typeof data.correctCount === 'number') {
          count += data.correctCount;
        } else if (typeof data.numCorrect === 'number') {
          count += data.numCorrect;
        } else if (typeof data.score === 'number' && typeof data.total === 'number') {
          count += data.score;
        } else if (Array.isArray(data.results)) {
          data.results.forEach(function (r) { if (r && (r.correct === true || r.isCorrect === true)) count++; });
        } else if (Array.isArray(data.answers)) {
          data.answers.forEach(function (r) { if (r && (r.correct === true || r.isCorrect === true)) count++; });
        }
      }
      try {
        var manual = parseInt(localStorage.getItem(STORAGE_PREFIX + '__rank_manual_correct') || '0', 10);
        if (!isNaN(manual)) count += manual;
      } catch (e) {}
      return count;
    }
    window.__getEnglishQuizCorrectCount = countCorrect;

    function getRankInfo(n) {
      var cur = RANKS[0], next = null;
      for (var i = 0; i < RANKS.length; i++) {
        if (n >= RANKS[i].threshold) cur = RANKS[i];
        else { next = RANKS[i]; break; }
      }
      return { current: cur, next: next, total: n };
    }
    window.__getEnglishQuizRankInfo = getRankInfo;

    var lastShownLv = null;
    function showRankUpToast(rank) {
      if (typeof document === 'undefined' || !document.body) return;
      var t = document.createElement('div');
      t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);z-index:2147483647;background:linear-gradient(135deg,' + rank.color + ',#0f172a);color:#fff;padding:24px 32px;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,0.45);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;text-align:center;opacity:0;transition:opacity .35s ease, transform .35s ease;min-width:240px;max-width:90vw;';
      t.innerHTML = '<div style="font-size:13px;opacity:0.85;margin-bottom:6px;letter-spacing:0.1em;">🎉 ランクアップ!</div>'
                  + '<div style="font-size:54px;line-height:1;margin-bottom:10px;">' + rank.icon + '</div>'
                  + '<div style="font-size:22px;font-weight:800;letter-spacing:0.04em;">' + rank.name + '</div>'

        var byKw = {};

    function safeParse(raw, fb) { try { return JSON.parse(raw); } catch (e) { return fb; } }

    function inferModeIncrement(delta) {
      var c = { listening: 0, speaking: 0, writing: 0 };
      if (delta <= 0) return c;
      var entries = [];
      var len = 0;
      try { len = localStorage.length; } catch (e) { len = 0; }

        var k = null;

    function computeMaxStreak(prevMax) {

        var k = null;

    function consecDays(dates) {
      if (!dates || !dates.length) return 0;
      var set = {}; dates.forEach(function (d) { set[d] = 1; });

    }

    function consecutiveWeekendWeeks(dates) {
      if (!dates || !dates.length) return 0;
      var set = {}; dates.forEach(function (d) { set[d] = 1; });
      var today = new Date();
      var weeks = 0;
      for (var w = 0; w < 60; w++) {
        var ref = new Date(today.getTime() - w * 7 * 86400000);

        var hasSun = sun <= today && set[dateStr(sun)];

        } else {

          break;
        }

      return weeks;
    }

// 全短文リスト（復習用）
const ALL_SENTENCES = [...SENTENCES_LEVEL1, ...SENTENCES_LEVEL2, ...SENTENCES_LEVEL3, ...SENTENCES_LEVEL4, ...SENTENCES_LEVEL5];


// --- ユーティリティ関数 ---
const shuffle = (array) => {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
};

const formatDate = (isoString) => {
  const d = new Date(isoString);
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
};

// 読み上げ機能
const speakText = (text) => {
  if (!text) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.85;
  window.speechSynthesis.speak(utterance);
};


// --- コンポーネント群 ---

// プログレスバー
const ProgressBar = ({ current, total }) => {
  const percentage = (current / total) * 100;
  return (
    <div className="w-full bg-slate-200 h-1.5 shrink-0">
      <div 
        className="bg-blue-500 h-1.5 transition-all duration-300 ease-out" 
        style={{ width: `${percentage}%` }}
      ></div>
    </div>
  );
};

// カスタム確認モーダル

// 1. 単語テスト (4択 + 音声認識ステップ)
const WordTest = ({ questions, currentIndex, setCurrentIndex, score, setScore, onFinish, wordsData, onAnswer }) => {
  const [options, setOptions] = useState([]);
  const [selected, setSelected] = useState(null);

  // 発音テスト用の状態
  const [speechPassed, setSpeechPassed] = useState(false);
  const [isListening, setIsListening] = useState(false);
  const [recognizedText, setRecognizedText] = useState('');
  // 入力モード ('mic' = 音声 / 'text' = キーボード入力)
  const [inputMode, setInputMode] = useState(() => {
    try { return localStorage.getItem('english-quiz:wordInputMode') || 'mic'; } catch (e) { return 'mic'; }
  });
  const [typedText, setTypedText] = useState('');
  useEffect(() => {
    try { localStorage.setItem('english-quiz:wordInputMode', inputMode); } catch (e) {}
  }, [inputMode]);
  const currentQ = questions[currentIndex];

  useEffect(() => {
    if (questions.length > 0) {
      const currentQ = questions[currentIndex];
      const otherWords = shuffle(wordsData.filter(w => w.en !== currentQ.en && w.ja !== currentQ.ja)).slice(0, 3);
      const newOptions = shuffle([currentQ, ...otherWords]);
      setOptions(newOptions);
      setSelected(null);
      setSpeechPassed(false);
      setIsListening(false);
      setRecognizedText('');
      setTypedText('');
    }
  }, [currentIndex, questions, wordsData]);

  const startListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setSpeechPassed(true);
      return;
    }

    try {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      const timeoutId = setTimeout(() => {
        if (!isListening) {
           recognition.stop();
           setRecognizedText('起動タイムアウト。スキップしてください');
        }
      }, 3000);

      recognition.onstart = () => {
        clearTimeout(timeoutId);
        setIsListening(true);
        setRecognizedText('聞き取っています...');
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        setRecognizedText(transcript);
        setIsListening(false);
        checkAnswer(transcript); 
      };

      recognition.onerror = (event) => {
        clearTimeout(timeoutId);
        console.error("Speech recognition error", event.error);
        setIsListening(false);
        setRecognizedText('エラー発生。スキップしてください');
      };

      recognition.onend = () => {
        clearTimeout(timeoutId);
        setIsListening(false);
      };

      recognition.start();
    } catch (e) {
      console.error(e);
      setIsListening(false);
      setRecognizedText('エラー発生。スキップしてください');
    }
  };

  const checkAnswer = (transcript) => {
    const normalize = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');
    if (normalize(transcript) === normalize(currentQ.en)) {
      setSpeechPassed(true);
    }
  };

  const handleSelect = (option) => {
    if (selected || !speechPassed) return; 
    setSelected(option);
    const isCorrect = option.en === questions[currentIndex].en;
    
    if (isCorrect) setScore(s => s + 1);
    onAnswer(isCorrect);

    setTimeout(() => {
      if (currentIndex < questions.length - 1) {
        setCurrentIndex(i => i + 1);
      } else {
        onFinish();
      }
    }, 1000);
  };

  return (
    <div className="flex flex-col h-full bg-white relative">
      <ProgressBar current={currentIndex} total={questions.length} />
      <div className="p-6 flex-1 flex flex-col justify-center overflow-y-auto">
        <div className="w-full max-w-md md:max-w-3xl mx-auto flex flex-col justify-center">
          <div className="text-center mb-2 text-sm text-slate-500 font-medium tracking-wider">
            問題 {currentIndex + 1} / {questions.length}
          </div>
          <div className="text-center mb-8">
            <button 
              onClick={() => speakText(currentQ?.en)}
              className="group relative inline-flex items-center justify-center cursor-pointer hover:scale-105 transition-transform"
              title="発音を聞く"
            >
              <h2 className="text-4xl font-bold text-slate-800 mb-2 group-hover:text-blue-600 transition-colors">{currentQ?.en}</h2>
              <Volume2 size={24} className="absolute -right-8 text-slate-300 group-hover:text-blue-500 transition-colors" />
            </button>
          </div>

          {!speechPassed ? (
            <div className="flex flex-col items-center animate-in fade-in duration-300 mb-4 bg-slate-50 p-6 rounded-2xl border border-slate-100">
               <div className="flex gap-1 mb-4 p-1 bg-white rounded-xl border border-slate-200">
                 <button
                   onClick={() => setInputMode('mic')}
                   className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${inputMode === 'mic' ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                 >
                   <Mic size={14} /> マイク
                 </button>
                 <button
                   onClick={() => setInputMode('text')}
                   className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${inputMode === 'text' ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                 >
                   <PenTool size={14} /> 文字入力
                 </button>
               </div>
               {inputMode === 'mic' ? (
                 <>
                   <p className="text-slate-500 text-sm mb-4 font-bold">マイクを押して発音してください</p>
                   <button 
                     onClick={startListening}
                     disabled={isListening}
                     className={`w-20 h-20 rounded-full flex items-center justify-center transition-all shadow-md mb-4 ${isListening ? 'bg-rose-500 text-white animate-pulse' : 'bg-blue-600 text-white hover:bg-blue-700 active:scale-95'}`}
                   >
                     <Mic size={32} />
                   </button>
                 </>
               ) : (
                 <>
                   <p className="text-slate-500 text-sm mb-3 font-bold">英単語を入力してください</p>
                   <form
                     onSubmit={(e) => {
                       e.preventDefault();
                       const t = typedText.trim();
                       if (!t) return;
                       setRecognizedText(t);
                       checkAnswer(t);
                     }}
                     className="w-full max-w-xs flex flex-col items-stretch gap-2 mb-2"
                   >
                     <input
                       type="text"
                       value={typedText}
                       onChange={(e) => setTypedText(e.target.value)}
                       autoCapitalize="off"
                       autoCorrect="off"
                       spellCheck={false}
                       placeholder="ここに英単語を入力"
                       className="w-full px-4 py-3 text-lg border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:outline-none text-center font-mono bg-white"
                     />
                     <button type="submit" className="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 active:scale-95 transition-all">
                       送信
                     </button>
                   </form>
                 </>
               )}
              {recognizedText && (
                 <div className="text-center w-full">
                    <p className="text-xs text-slate-400">{inputMode === 'mic' ? 'ステータス:' : '入力:'}</p>
                    <p className={`font-mono text-base font-bold px-2 break-words ${recognizedText === '聞き取っています...' ? 'text-slate-400' : 'text-rose-500'}`}>{recognizedText}</p>
                 </div>
              )}
              <button onClick={() => setSpeechPassed(true)} className="mt-4 text-xs text-slate-400 underline hover:text-slate-600 p-2">
                {inputMode === 'mic' ? '発音をスキップする' : '入力をスキップする'}
              </button>
            </div>
          ) : (
            <div className="animate-in slide-in-from-bottom-4 duration-300 w-full">
               <p className="text-slate-500 mt-2 text-center mb-4 font-bold text-emerald-600 flex items-center justify-center gap-1"><CheckCircle2 size={18}/> 正しい意味を選んでください</p>
               <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {options.map((opt, idx) => {
                  let btnClass = "p-4 rounded-xl border-2 text-[15px] md:text-lg font-medium transition-all text-left w-full ";
                  
                  if (!selected) {
                    btnClass += "border-slate-200 bg-white hover:border-blue-400 hover:bg-blue-50 text-slate-700 active:scale-[0.98]";
                  } else {
                    const isCorrectOption = opt.en === currentQ.en;
                    const isSelectedOption = opt === selected;
                    
                    if (isCorrectOption) {
                      btnClass += "border-emerald-500 bg-emerald-50 text-emerald-700";
                    } else if (isSelectedOption) {
                      btnClass += "border-rose-500 bg-rose-50 text-rose-700";
                    } else {
                      btnClass += "border-slate-200 bg-white text-slate-400 opacity-50";
                    }
                  }

                  return (
                    <button 
                      key={idx} 
                      onClick={() => handleSelect(opt)}
                      className={btnClass}
                      disabled={!!selected}
                    >
                      <div className="flex justify-between items-center">
                        <span>{opt.ja}</span>
                        {selected && opt.en === currentQ.en && <CheckCircle2 className="text-emerald-500" />}
                        {selected && opt === selected && opt.en !== currentQ.en && <XCircle className="text-rose-500" />}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// 2. 短文和訳テスト (入力判定式)
const SentenceTest = ({ questions, currentIndex, setCurrentIndex, score, setScore, onFinish, onAnswer }) => {
  const [inputText, setInputText] = useState('');
  const [showResult, setShowResult] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  const [overrideCorrect, setOverrideCorrect] = useState(false);
  const currentQ = questions[currentIndex];

  useEffect(() => {
    setInputText('');
    setShowResult(false);
    setIsCorrect(false);
    setOverrideCorrect(false);
  }, [currentIndex]);

  const handleCheck = () => {
    if (!inputText.trim()) return;
    const normalize = (str) => str.replace(/[\s　、。！？!?]/g, '');
    const match = normalize(inputText) === normalize(currentQ.ja);
    setIsCorrect(match);
    setShowResult(true);
  };

  const handleNext = () => {
    const finalIsCorrect = isCorrect || overrideCorrect;
    if (finalIsCorrect) setScore(s => s + 1);
    onAnswer(finalIsCorrect);
    
    if (currentIndex < questions.length - 1) {
      setCurrentIndex(i => i + 1);
    } else {
      onFinish();
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.nativeEvent.isComposing) {
      e.preventDefault();
      if (!showResult) {
        handleCheck();
      } else {
        handleNext();
      }
    }
  };

  return (
    <div className="flex flex-col h-full bg-white relative">
      <ProgressBar current={currentIndex} total={questions.length} />
      <div className="p-6 flex-1 flex flex-col items-center overflow-y-auto">
        <div className="text-center mb-4 text-sm text-slate-500 font-medium tracking-wider w-full">
          問題 {currentIndex + 1} / {questions.length}
        </div>
        
        <div className="flex-1 flex flex-col justify-center items-center w-full max-w-md md:max-w-2xl mx-auto">
          <button 
            onClick={() => speakText(currentQ?.en)}
            className="w-full bg-blue-50 hover:bg-blue-100 p-6 rounded-2xl mb-6 shadow-sm border border-blue-100 transition-colors group relative"
            title="発音を聞く"
          >
            <Volume2 size={20} className="absolute top-4 right-4 text-blue-300 group-hover:text-blue-500 transition-colors" />
            <h2 className="text-xl font-bold text-slate-800 text-center leading-relaxed group-hover:text-blue-700 transition-colors">
              {currentQ?.en}
            </h2>
          </button>

          <p className="text-slate-500 text-sm mb-2 w-full text-left">日本語訳を入力してください</p>
          <textarea
            value={inputText}
            onChange={(e) => setInputText(e.target.value)}
            onKeyDown={handleKeyDown}
            disabled={showResult}
            placeholder="ここに日本語を入力..."
            className="w-full p-4 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50 mb-6 resize-none h-28 transition-colors disabled:bg-slate-100 disabled:text-slate-500"
          />

          {!showResult ? (
            <button 
              onClick={handleCheck}
              disabled={!inputText.trim()}
              className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md hover:bg-blue-700 active:scale-[0.98] transition-all disabled:opacity-50 disabled:active:scale-100"
            >
              答え合わせ
            </button>
          ) : (
            <div className="w-full flex flex-col items-center animate-in fade-in slide-in-from-bottom-4 duration-300">
              <div className={`w-full p-4 rounded-xl mb-4 text-center font-bold text-lg flex items-center justify-center gap-2 ${isCorrect ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-rose-100 text-rose-700 border border-rose-200'}`}>
                {isCorrect ? <><CheckCircle2 /> 正解！</> : <><XCircle /> 不正解</>}
              </div>
              
              {!isCorrect && (
                <div className="mb-4 w-full bg-slate-50 p-4 rounded-xl border border-slate-200 text-left">
                  <p className="text-sm text-slate-500 mb-1">模範解答：</p>
                  <p className="text-lg font-bold text-slate-800 mb-3 border-b border-slate-200 pb-2">{currentQ?.ja}</p>
                  
                  {!overrideCorrect ? (
                    <button 
                      onClick={() => setOverrideCorrect(true)}
                      className="w-full py-2 border-2 border-emerald-400 text-emerald-600 bg-emerald-50 rounded-lg text-sm font-bold hover:bg-emerald-100 transition-colors flex items-center justify-center gap-2"
                    >
                      <CheckCircle2 size={16} /> 意味は合っているので正解にする
                    </button>
                  ) : (
                    <div className="text-center text-emerald-600 text-sm font-bold flex items-center justify-center gap-1">
                      <CheckCircle2 size={16} /> 正解として記録します
                    </div>
                  )}
                </div>
              )}

              <button 
                onClick={handleNext}
                className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold text-lg shadow-md hover:bg-slate-700 active:scale-[0.98] transition-all flex justify-center items-center gap-2 mt-2"
              >
                次へ <ArrowRight size={20} />
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// 3. リスニングテスト (ディクテーション)
const ListeningTest = ({ questions, currentIndex, setCurrentIndex, score, setScore, onFinish, onAnswer }) => {
  const [inputText, setInputText] = useState('');
  const [showResult, setShowResult] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  const inputRef = useRef(null);
  const currentQ = questions[currentIndex];

  useEffect(() => {
    setInputText('');
    setShowResult(false);
  }, [currentIndex]);

  const handleCheck = () => {
    if (inputText.trim() === '') return;
    const correctAns = currentQ.en.toLowerCase();
    const userAns = inputText.trim().toLowerCase();
    
    const correct = correctAns === userAns;
    setIsCorrect(correct);
    if (correct) setScore(s => s + 1);
    setShowResult(true);
    onAnswer(correct);
  };

  const handleNext = () => {
    if (currentIndex < questions.length - 1) {
      setCurrentIndex(i => i + 1);
    } else {
      onFinish();
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') {
      if (!showResult) {
        handleCheck();
      } else {
        handleNext();
      }
    }
  };

  return (
    <div className="flex flex-col h-full bg-white relative">
      <ProgressBar current={currentIndex} total={questions.length} />
      <div className="p-6 flex-1 flex flex-col items-center overflow-y-auto">
        <div className="text-center mb-6 text-sm text-slate-500 font-medium tracking-wider w-full">
          問題 {currentIndex + 1} / {questions.length}
        </div>
        
        <div className="flex-1 flex flex-col justify-center items-center w-full max-w-md md:max-w-2xl mx-auto">
          
          <button 
            onClick={() => speakText(currentQ?.en)}
            className="mb-8 w-24 h-24 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-200 hover:scale-105 transition-all shadow-sm active:scale-95"
          >
            <Volume2 size={48} />
          </button>
          
          <p className="text-slate-500 text-sm mb-4">聞こえた英単語を入力してください</p>

          <input
            ref={inputRef}
            type="text"
            value={inputText}
            onChange={(e) => setInputText(e.target.value)}
            onKeyDown={handleKeyDown}
            disabled={showResult}
            placeholder="Type here..."
            className="w-full text-center text-2xl p-4 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50 mb-6 font-mono transition-colors disabled:bg-slate-100 disabled:text-slate-500"
            autoComplete="off"
            autoCapitalize="off"
            spellCheck="false"
          />

          {!showResult ? (
            <button 
              onClick={handleCheck}
              disabled={inputText.trim() === ''}
              className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md hover:bg-blue-700 active:scale-[0.98] transition-all disabled:opacity-50 disabled:active:scale-100"
            >
              解答する
            </button>
          ) : (
            <div className="w-full flex flex-col items-center animate-in fade-in slide-in-from-bottom-4 duration-300">
              <div className={`w-full p-4 rounded-xl mb-4 text-center font-bold text-lg flex items-center justify-center gap-2 ${isCorrect ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-rose-100 text-rose-700 border border-rose-200'}`}>
                {isCorrect ? <><CheckCircle2 /> 正解！</> : <><XCircle /> 不正解</>}
              </div>
              
              {!isCorrect && (
                <div className="mb-6 text-center w-full bg-slate-50 p-4 rounded-xl border border-slate-200">
                  <p className="text-sm text-slate-500 mb-1">正解は</p>
                  <p className="text-2xl font-bold text-slate-800">{currentQ?.en}</p>
                  <p className="text-sm text-slate-600 mt-2">{currentQ?.ja}</p>
                </div>
              )}

              <button 
                onClick={handleNext}
                className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold text-lg shadow-md hover:bg-slate-700 active:scale-[0.98] transition-all flex justify-center items-center gap-2"
              >
                次へ <ArrowRight size={20} />
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// 4. 英作文テスト (和文英訳)
const WritingTest = ({ questions, currentIndex, setCurrentIndex, score, setScore, onFinish, onAnswer }) => {
  const [inputText, setInputText] = useState('');
  const [showResult, setShowResult] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  const [overrideCorrect, setOverrideCorrect] = useState(false);

  useEffect(() => {
    setInputText('');
    setShowResult(false);
    setIsCorrect(false);
    setOverrideCorrect(false);
  }, [currentIndex]);

  const handleCheck = () => {
    if (!inputText.trim()) return;
    const normalize = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');
    const match = normalize(inputText) === normalize(currentQ.en);
    setIsCorrect(match);
    setShowResult(true);
  };

  const handleNext = () => {
    const finalIsCorrect = isCorrect || overrideCorrect;
    if (finalIsCorrect) setScore(s => s + 1);
    onAnswer(finalIsCorrect);
    
    if (currentIndex < questions.length - 1) {
      setCurrentIndex(i => i + 1);
    } else {
      onFinish();
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!showResult) {
        handleCheck();
      } else {
        handleNext();
      }
    }

  return (

            onKeyDown={handleKeyDown}
            disabled={showResult}
            placeholder="Type your English translation here..."
            className="w-full p-4 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-amber-500 bg-slate-50 mb-6 resize-none h-28 transition-colors disabled:bg-slate-100 disabled:text-slate-500 font-mono text-lg"
